name: Update News
on:
  schedule:
    - cron: '* * * * *' # Elke minuut
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Fetch RSS and convert to JSON
        run: |
          # Haal de RSS feed op
          curl -sL https://rss.nos.nl/nosnieuwsalgemeen > nos.xml
          
          # Gebruik Python om de XML veilig te parsen naar JSON
          python3 -c "
          import xml.etree.ElementTree as ET
          import json
          import os

          try:
              tree = ET.parse('nos.xml')
              root = tree.getroot()
              items = []
              
              for item in root.findall('.//item'):
                  title = item.find('title').text if item.find('title') is not None else 'Geen titel'
                  link = item.find('link').text if item.find('link') is not None else '#'
                  pubDate = item.find('pubDate').text if item.find('pubDate') is not None else ''
                  
                  # Formatteer datum (optioneel: haal alleen tijd eruit)
                  # pubDate ziet eruit als: Mon, 04 May 2026 15:30:00 +0200
                  short_time = ' '.join(pubDate.split(' ')[4:5])[:-3] if pubDate else ''
                  
                  items.append({
                      'title': title,
                      'link': link,
                      'pubDate': short_time if short_time else pubDate
                  })
              
              with open('news.json', 'w') as f:
                  json.dump(items[:25], f, indent=2)
              print(f'Succesvol {len(items)} items verwerkt.')
          except Exception as e:
              print(f'Fout bij verwerken RSS: {e}')
              # Maak een dummy bestand als het mislukt om fouten in dashboard te voorkomen
              if not os.path.exists('news.json'):
                  with open('news.json', 'w') as f:
                      json.dump([{'title': 'Nieuwsfeed tijdelijk niet beschikbaar', 'link': '#', 'pubDate': ''}], f)
          "
          
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add news.json
          git commit -m "Update news.json via robuuste parser" || exit 0
          git push
