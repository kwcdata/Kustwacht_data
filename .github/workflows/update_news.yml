name: Update NOS News

on:
  schedule:
    # Dit voert het script elke 5 minuten uit
    - cron: '*/5 * * * *'
  workflow_dispatch: # Hiermee kun je het handmatig starten in het 'Actions' tabblad

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch news
        run: python fetch_news.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add news.json
          # Alleen commiten als er echt iets veranderd is
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news.json" && git push)
