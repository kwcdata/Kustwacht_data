name: Update NOS News

on:
  schedule:
    # Dit zorgt ervoor dat het script elke 5 minuten draait
    - cron: '*/5 * * * *'
  # Dit zorgt ervoor dat je de update ook handmatig kunt starten via het 'Actions' tabblad
  workflow_dispatch: 

# CRUCIAAL: Dit geeft de Action toestemming om bestanden (news.json) aan te passen
permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install feedparser pytz

      - name: Run fetch_news.py
        run: python fetch_news.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add news.json
          # Alleen committen en pushen als news.json daadwerkelijk is veranderd
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatische nieuws update" && git push)
