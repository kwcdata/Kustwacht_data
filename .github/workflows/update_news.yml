name: Update NOS News

on:
  schedule:
    - cron: '*/5 * * * *'  # Elke 5 minuten
  workflow_dispatch:      # Om handmatig te kunnen testen

permissions:
  contents: write         # CRUCIAAL: Geeft de Action recht om bestanden aan te passen

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch news
        run: python fetch_news.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add news.json
          # Controleer of er echt iets veranderd is
          if git diff --staged --quiet; then
            echo "Geen wijzigingen gevonden in news.json"
          else
            git commit -m "Update news.json: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
