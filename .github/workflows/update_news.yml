name: Update NOS News

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

# Voeg dit blok toe om rechten expliciet in de code te zetten
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Geüpdatet naar v4 voor Node.js 20+

      - name: Set up Python
        uses: actions/setup-python@v5 # Geüpdatet naar v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch news
        run: python fetch_news.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news.json met snippets" && git push)
