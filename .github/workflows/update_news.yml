name: Update News
on:
  schedule:
    - cron: '*/5 * * * *' # Elke 5 minuten (GitHub houdt niet van elke minuut bij kleine repo's)
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Fetch and Process RSS
        run: |
          python3 -c "
          import urllib.request
          import xml.etree.ElementTree as ET
          import json
          import os

          url = 'https://rss.nos.nl/nosnieuwsalgemeen'
          headers = {'User-Agent': 'Mozilla/5.0'}

          try:
              # Download direct in Python om exit code 6 te vermijden
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as response:
                  xml_data = response.read()
              
              root = ET.fromstring(xml_data)
              items = []
              
              for item in root.findall('.//item'):
                  title = item.find('title').text if item.find('title') is not None else 'Geen titel'
                  link = item.find('link').text if item.find('link') is not None else '#'
                  pubDate = item.find('pubDate').text if item.find('pubDate') is not None else ''
                  
                  # Pak alleen de tijdstip (HH:MM)
                  time_part = ''
                  if pubDate and len(pubDate.split(' ')) > 4:
                      time_part = pubDate.split(' ')[4][:5]

                  items.append({
                      'title': title,
                      'link': link,
                      'pubDate': time_part if time_part else pubDate
                  })
              
              with open('news.json', 'w') as f:
                  json.dump(items[:25], f, indent=2)
              print('Succesvol news.json bijgewerkt.')

          except Exception as e:
              print(f'Fout: {e}')
              # Zorg dat er altijd een geldig bestand is
              if not os.path.exists('news.json'):
                  with open('news.json', 'w') as f:
                      json.dump([{'title': 'Nieuws tijdelijk niet beschikbaar', 'link': '#', 'pubDate': ''}], f)
          "
          
      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add news.json
          git commit -m "Update news.json via Python urllib" || exit 0
          git push
