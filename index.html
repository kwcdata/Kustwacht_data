<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Kustwacht Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/kwcdata/Kustwacht_data/refs/heads/main/kustwacht-logo.svg">
    
    <style>
        :root {
            --brand-color: #4df2ff; 
            --bg-dark: #1e252b;    
            --bg-black: #0d1117;   
            --text-main: #ffffff;
            --border-color: #30363d;
        }

        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: var(--bg-black); color: var(--text-main); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        header { 
            padding: 2px 15px; 
            background: var(--bg-dark); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            height: 40px; 
            flex-shrink: 0;
        }
        .header-title-area { display: flex; align-items: center; gap: 10px; }
        .header-logo { height: 28px; width: auto; }
        header h1 { margin: 0; font-size: 13px; color: var(--brand-color); text-transform: uppercase; letter-spacing: 1px; }
        
        .header-info-area { display: flex; align-items: center; gap: 20px; }
        .clocks { display: flex; gap: 15px; font-family: 'Courier New', monospace; }
        .clock-item { display: flex; align-items: baseline; gap: 6px; } 
        .clock-label { font-size: 9px; color: #8b949e; text-transform: uppercase; font-weight: bold; }
        .clock-time { font-size: 28px; color: var(--brand-color); font-weight: 800; line-height: 1; }
        
        .fetch-display { 
            font-family: 'Courier New', monospace; 
            display: flex; 
            align-items: baseline; 
            gap: 6px; 
            border-left: 1px solid var(--border-color); 
            padding-left: 15px; 
        }
        .fetch-label { font-size: 9px; color: #8b949e; text-transform: uppercase; }
        .fetch-time { font-size: 18px; color: #c9d1d9; font-weight: bold; }

        .nav-bar { 
            background: var(--bg-dark); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            padding: 0 10px; 
            z-index: 1000; 
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            min-height: 24px;
        }
        .nav-links-wrapper { display: flex; flex-wrap: wrap; align-items: center; flex-grow: 1; }
        .nav-group { 
            position: relative; 
            padding: 2px 8px; 
            cursor: pointer; 
            font-size: 10px; 
            font-weight: bold; 
            color: #c9d1d9; 
            text-transform: uppercase; 
            white-space: nowrap;
        }
        .nav-group:hover { background: #30363d; color: var(--brand-color); }
        
        .dropdown { display: none; position: absolute; top: 100%; left: 0; background: #161b22; border: 1px solid var(--border-color); min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.8); max-height: 80vh; overflow-y: auto; overflow-x: hidden; }
        .nav-group:hover .dropdown { display: block; }
        
        .dropdown a, .dropdown button { 
            color: #c9d1d9; padding: 6px 12px; text-decoration: none; display: block; font-size: 11px; border-bottom: 1px solid var(--border-color); width: 100%; text-align: left; background: none; border: none; cursor: pointer; font-family: inherit;
        }
        .dropdown a:hover, .dropdown button:hover { background: var(--brand-color); color: #000; }

        .nav-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        button.reset-nav { padding: 1px 6px; background: #21262d; color: #c9d1d9; border: 1px solid var(--border-color); cursor: pointer; font-size: 9px; font-weight: bold; text-transform: uppercase; border-radius: 2px; }

        .monitor-layout { display: grid; grid-template-columns: 1fr 360px; grid-gap: 6px; flex-grow: 1; padding: 6px; overflow: hidden; }
        .webcam-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; grid-gap: 8px; position: relative; }
        
        .cam-box { display: flex; flex-direction: column; gap: 2px; height: 100%; min-height: 0; }
        .cam-box.full-slot { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; background: var(--bg-black); padding: 5px; box-sizing: border-box; }

        .slot { position: relative; background: #000; border-radius: 2px; overflow: hidden; border: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .webcam-grid .slot { flex-grow: 1; }
        .slot iframe { flex-grow: 1; width: 100%; border: none; }
        
        .label { background: var(--brand-color); color: #000; padding: 2px 8px; font-size: 11px; font-weight: 900; text-transform: uppercase; display: block; flex-shrink: 0; z-index: 10; letter-spacing: 0.5px; }
        
        .cam-footer { display: flex; gap: 2px; align-items: center; height: 22px; flex-shrink: 0; }
        .cam-selector { background: #161b22; color: #c9d1d9; border: 1px solid var(--border-color); padding: 2px; font-size: 10px; outline: none; border-radius: 2px; flex-grow: 1; }
        .expand-btn { background: #161b22; color: var(--brand-color); border: 1px solid var(--border-color); padding: 0 6px; cursor: pointer; font-size: 12px; height: 22px; display: flex; align-items: center; justify-content: center; }

        .info-column { display: flex; flex-direction: column; gap: 6px; height: 100%; overflow: hidden; }
        .info-column .slot { flex: 1; min-height: 0; display: flex; flex-direction: column; }
        .img-container { flex: 1; position: relative; overflow: hidden; background: #000; }
        .info-column img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <div class="header-title-area">
            <img src="https://raw.githubusercontent.com/kwcdata/Kustwacht_data/refs/heads/main/kustwacht-logo.svg" alt="Kustwacht Logo" class="header-logo">
            <h1>Kustwacht Dashboard</h1>
        </div>
        <div class="header-info-area">
            <div class="clocks">
                <div class="clock-item"><span class="clock-label">Lokaal</span><span id="local-clock" class="clock-time">00:00:00</span></div>
                <div class="clock-item"><span class="clock-label">Zulu</span><span id="zulu-clock" class="clock-time">00:00:00</span></div>
            </div>
            <div class="fetch-display">
                <span class="fetch-label">Update</span>
                <span id="last-update" class="fetch-time">--:--:--</span>
            </div>
        </div>
    </header>

    <nav class="nav-bar">
        <div class="nav-links-wrapper" id="nav-bar-links"></div>
        <div class="nav-controls">
            <div class="nav-group" style="color:var(--brand-color)">VLOOT TRACKING ▾
                <div class="dropdown" id="fleet-dropdown"></div>
            </div>
            <button class="reset-nav" onclick="hardReset()">Reset</button>
        </div>
    </nav>

    <div class="monitor-layout">
        <div class="webcam-grid">
            <div class="cam-box" id="box-1">
                <div class="slot"><span class="label" id="lbl-1">L-Boven</span><div id="cont-1" style="height:100%; display:flex; flex-direction:column;"></div></div>
                <div class="cam-footer">
                    <select class="cam-selector" id="sel-1" onchange="changeCam(1)"></select>
                    <button class="expand-btn" onclick="toggleFullscreen(1)">⛶</button>
                </div>
            </div>
            <div class="cam-box" id="box-2">
                <div class="slot"><span class="label" id="lbl-2">R-Boven</span><div id="cont-2" style="height:100%; display:flex; flex-direction:column;"></div></div>
                <div class="cam-footer">
                    <select class="cam-selector" id="sel-2" onchange="changeCam(2)"></select>
                    <button class="expand-btn" onclick="toggleFullscreen(2)">⛶</button>
                </div>
            </div>
            <div class="cam-box" id="box-3">
                <div class="slot"><span class="label" id="lbl-3">L-Onder</span><div id="cont-3" style="height:100%; display:flex; flex-direction:column;"></div></div>
                <div class="cam-footer">
                    <select class="cam-selector" id="sel-3" onchange="changeCam(3)"></select>
                    <button class="expand-btn" onclick="toggleFullscreen(3)">⛶</button>
                </div>
            </div>
            <div class="cam-box" id="box-4">
                <div class="slot"><span class="label" id="lbl-4">R-Onder</span><div id="cont-4" style="height:100%; display:flex; flex-direction:column;"></div></div>
                <div class="cam-footer">
                    <select class="cam-selector" id="sel-4" onchange="changeCam(4)"></select>
                    <button class="expand-btn" onclick="toggleFullscreen(4)">⛶</button>
                </div>
            </div>
        </div>
        <div class="info-column">
            <div class="slot"><span class="label">Noordzee</span><div class="img-container"><img id="knmi-1"></div></div>
            <div class="slot"><span class="label">Kust- en ruime binnenwateren</span><div class="img-container"><img id="knmi-2"></div></div>
            <div class="slot"><span class="label">Radar</span><div class="img-container"><img id="radar-img"></div></div>
        </div>
    </div>
</div>

            { name: "Flightradar24", url: "https://www.flightradar24.com/" }
        ]},
        { title: "Taal/Rekenen", links: [

        ]},
        { title: "Navigatie", links: [

            { name: "Hectometerpaal", url: "http://www.hmpaal.nl/" },
            { name: "Time Zone Map", url: "https://www.timeanddate.com/time/map/" },
            { name: "Apple Maps Beta", url: "https://beta.maps.apple.com/" },
            { name: "Remove Paywalls", url: "https://removepaywalls.com/" }
        ]},
        { title: "Beheer", links: [
            { name: "GitHub Edit", url: "https://github.com/kwcdata/Kustwacht_data/edit/main/index.html" }
        ]}
    ];

    const sourceData = {
        systems: [
            {id: 'https://m.p2kflex.nl/index.php?regio=401%3B403%3B404%3B406%3B&audio=none&volume=75&include=water%3Blvo%3Bredding%3Bgrip%3Bscheepvaart&exclude=none&capcode=none&city=&geo=0&colors=%23F00%2C%23FF0%2C%2300F%2C%233D9%2C%233D9%2C%23F90%2C18%2C15%2C15%2C0%2C0%2C0%2C0%2C0%2C0', name: '★ P2000 (Kustwacht)', type: 'web'},
            {id: 'https://nos.nl/teletekst/101', name: '★ Teletekst 101', type: 'web'},
            {id: 'https://globe.adsbexchange.com/?lat=52.955&lon=4.760&zoom=8', name: 'ADS-B Exchange', type: 'web'},
            {id: 'https://m.p2kflex.nl/index.php?regio=none%3B&audio=&volume=75&include=&exclude=&capcode=&city=&geo=0&colors=%23F00%2C%23FF0%2C%2300F%2C%233D9%2C%233D9%2C%23F90%2C18%2C15%2C15%2C0%2C0%2C0%2C0%2C0%2C0', name: 'P2000 (Basis)', type: 'web'}
        ],
        webcams: [
            {id: 'KjK02QIm4ZI', name: 'Brouwersdam', type: 'yt'},
            {id: 'mI1Os7TFdGc', name: 'Egmond aan Zee', type: 'yt'},
            {id: 'jDF264Bg1_c', name: 'Hoek v Holland Blvd', type: 'yt'},
            {id: 'mnxV4iit7S4', name: 'Kijkduin Blvd', type: 'yt'},
            {id: 'Ud7I4jprFN0', name: 'Maasvlakte', type: 'yt'},
            {id: '_pGIJmXxAHk', name: 'Nieuwe Waterweg', type: 'yt'},
            {id: 'dtFG_mcfWjQ', name: 'Noordwijk Blvd', type: 'yt'},
            {id: 'L76VKII_Z7k', name: 'Noordwijk Vuurtoren', type: 'yt'},
            {id: 'csMnwbjV5vg', name: 'Rockanje', type: 'yt'},
            {id: 'A5kXiKzbBFs', name: '★ Scheveningen Blvd', type: 'yt'},
            {id: 'DaG5JReOYEw', name: 'Scheveningen Noord', type: 'yt'},
            {id: 't3qbzZHOTyg', name: 'Wassenaarse Slag', type: 'yt'},
            {id: 'q0-DDh1zdY4', name: '★ Zandvoort Blvd', type: 'yt'}
        ]
    };

    // Standaard indeling: LB: P2000, RB: Teletekst, LO: Scheveningen, RO: Zandvoort
    const defaults = { 1: sourceData.systems[0].id, 2: sourceData.systems[1].id, 3: 'A5kXiKzbBFs', 4: 'q0-DDh1zdY4' };

    function updateClocks() {
        const nu = new Date();
        const opt = { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
        document.getElementById('local-clock').innerText = nu.toLocaleTimeString('nl-NL', { ...opt, timeZone: 'Europe/Amsterdam' });
        document.getElementById('zulu-clock').innerText = nu.toLocaleTimeString('nl-NL', { ...opt, timeZone: 'UTC' });
    }

    function initFleetMenu() {
        document.getElementById('fleet-dropdown').innerHTML = aircraft.map(p => `<button onclick="trackPlane('${p.icao}', '${p.reg}')">Track: ${p.reg}</button>`).join('');
    }

    function initNavBar() {
        document.getElementById('nav-bar-links').innerHTML = bookmarkGroups.map(g => `
            <div class="nav-group">${g.title} ▾
                <div class="dropdown">${g.links.map(l => `<a href="${l.url}" target="_blank">${l.name}</a>`).join('')}</div>
            </div>
        `).join('');
    }

    function trackPlane(icao, reg) {
        const url = `https://globe.adsbexchange.com/?icao=${icao}&zoom=11`;
        setCamera(2, url, `Tracking: ${reg}`, 'web');
        document.getElementById('sel-2').value = sourceData.systems[2].id; 
    }

    function setupSelectors() {
        for (let i = 1; i <= 4; i++) {
            const sel = document.getElementById('sel-' + i);
            sel.innerHTML = '';
            const g1 = document.createElement('optgroup'); g1.label = "SYSTEMEN";
            sourceData.systems.forEach(s => g1.appendChild(new Option(s.name, s.id)));
            const g2 = document.createElement('optgroup'); g2.label = "WEBCAMS";
            sourceData.webcams.forEach(w => g2.appendChild(new Option(w.name, w.id)));
            sel.appendChild(g1); sel.appendChild(g2);
            sel.value = defaults[i];
        }
    }

    function setCamera(pos, id, name, type) {
        const container = document.getElementById('cont-' + pos);
        const ts = new Date().getTime();
        const url = type === 'web' ? id : `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&rel=0&showinfo=0&t=${ts}`;
        container.innerHTML = `<iframe src="${url}" allow="autoplay; allowfullscreen"></iframe>`;
        document.getElementById('lbl-' + pos).innerText = name.replace("★ ", "");
    }

    function changeCam(pos) {
        const sel = document.getElementById('sel-' + pos);
        const id = sel.value;
        const name = sel.options[sel.selectedIndex].text;
        const type = sourceData.systems.find(s => s.id === id) ? 'web' : 'yt';
        setCamera(pos, id, name, type);
    }

    function toggleFullscreen(pos) {
        const box = document.getElementById('box-' + pos);
        const isFull = box.classList.contains('full-slot');
        document.querySelectorAll('.cam-box').forEach(b => b.classList.remove('full-slot'));
        if (!isFull) box.classList.add('full-slot');
    }

    function verversData() {
        const t = new Date().getTime();
        document.getElementById('knmi-1').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/northseamap.png?t=" + t;
        document.getElementById('knmi-2').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/waarschuwing_kust_0.gif?t=" + t;
        document.getElementById('radar-img').src = "https://api.buienradar.nl/image/1.0/RadarMapNL?w=350&h=350&random=" + t;
        document.getElementById('last-update').innerText = new Date().toLocaleTimeString('nl-NL', { hour12: false });
    }

    function hardReset() {
        document.querySelectorAll('.cam-box').forEach(b => b.classList.remove('full-slot'));
        for(let p in defaults) {
            const id = defaults[p];
            const item = [...sourceData.systems, ...sourceData.webcams].find(x => x.id === id);
            setCamera(p, id, item.name, sourceData.systems.find(s => s.id === id) ? 'web' : 'yt');
            document.getElementById('sel-'+p).value = id;
        }
        verversData();
    }

    document.addEventListener('DOMContentLoaded', () => { 
        setupSelectors(); initFleetMenu(); initNavBar(); hardReset(); updateClocks();
        setInterval(updateClocks, 1000); 
        setInterval(verversData, 300000); 
    });
</script>
</body>
</html>
