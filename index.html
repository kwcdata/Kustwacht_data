<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Kustwacht Dashboard</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        .main-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw; 
        }

        header {
            padding: 10px 20px;
            background: #050505;
            border-bottom: 1px solid #222;
            text-align: left;
        }

        header h1 {
            margin: 0;
            font-size: 18px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .monitor-layout { 
            display: grid; 
            grid-template-columns: 1fr 360px; 
            grid-gap: 8px; 
            flex-grow: 1; 
            padding: 8px; 
            overflow: hidden; 
        }

        .webcam-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            grid-gap: 10px; 
        }

        .cam-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
            height: 100%;
        }

        .slot { 
            position: relative; 
            background: #0a0a0a; 
            flex-grow: 1;
            border-radius: 4px; 
            overflow: hidden;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .slot iframe { 
            width: 100% !important; 
            height: 100% !important; 
            border: none; 
            object-fit: cover; 
        }

        .slot img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            background: #000; 
        }

        .label { 
            background: rgba(0, 212, 255, 0.85); 
            color: #000; padding: 2px 8px; font-size: 10px; font-weight: bold; 
            z-index: 20; text-transform: uppercase;
            display: inline-block;
            width: fit-content;
        }

        .cam-selector {
            background: #111;
            color: #ccc;
            border: 1px solid #333;
            padding: 6px;
            font-size: 11px;
            width: 100%;
            outline: none;
            border-radius: 2px;
        }

        .info-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
        }

        .knmi-card { height: 26%; }
        .radar-card { height: 42%; }

        /* Aangepaste stijl voor de radar: contain ipv cover */
        #radar-img {
            object-fit: contain;
            background-color: #000;
        }

        .timestamp {
            font-size: 10px;
            color: #666;
            text-align: right;
            padding: 2px 5px;
            font-family: monospace;
        }

        .controls { 
            background: #050505; 
            border-top: 1px solid #222; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 40px; 
        }

        button { 
            padding: 5px 20px;
            background: #222; 
            color: #bbb; 
            font-weight: bold; 
            cursor: pointer; 
            border: 1px solid #444;
            border-radius: 2px;
            font-size: 11px;
        }

        button:hover { background: #00d4ff; color: #000; border-color: #00d4ff; }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>Kustwacht Dashboard</h1>
    </header>

    <div class="monitor-layout">
        <div class="webcam-grid">
            <div class="cam-box">
                <div class="slot"><span class="label" id="lbl-1">L-Boven</span><div id="cont-1" style="height:100%"></div></div>
                <select class="cam-selector" id="sel-1" onchange="changeCam(1)"></select>
            </div>
            <div class="cam-box">
                <div class="slot"><span class="label" id="lbl-2">R-Boven</span><div id="cont-2" style="height:100%"></div></div>
                <select class="cam-selector" id="sel-2" onchange="changeCam(2)"></select>
            </div>
            <div class="cam-box">
                <div class="slot"><span class="label" id="lbl-3">L-Onder</span><div id="cont-3" style="height:100%"></div></div>
                <select class="cam-selector" id="sel-3" onchange="changeCam(3)"></select>
            </div>
            <div class="cam-box">
                <div class="slot"><span class="label" id="lbl-4">R-Onder</span><div id="cont-4" style="height:100%"></div></div>
                <select class="cam-selector" id="sel-4" onchange="changeCam(4)"></select>
            </div>
        </div>

        <div class="info-column">
            <div class="slot knmi-card">
                <span class="label">Noordzee</span>
                <img id="knmi-1" src="">
            </div>
            <div class="slot knmi-card">
                <span class="label">Kust- en ruime binnenwateren</span>
                <img id="knmi-2" src="">
            </div>
            <div class="slot radar-card">
                <span class="label">Actuele Buienloop (NL)</span>
                <img id="radar-img" src="https://api.buienradar.nl/image/1.0/RadarMapNL?w=350&h=350" alt="Radar">
            </div>
            <div id="last-update" class="timestamp">Laatste fetch: --:--:--</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="hardReset()">HERSTEL ALLE STANDAARDEN</button>
    </div>
</div>

<script>
    const camList = [
        {id: 'KjK02QIm4ZI', name: 'Brouwersdam'},
        {id: 'mI1Os7TFdGc', name: 'Egmond aan Zee'},
        {id: 'jDF264Bg1_c', name: 'Hoek v Holland Blvd'},
        {id: 'mnxV4iit7S4', name: 'Kijkduin Blvd'},
        {id: 'Ud7I4jprFN0', name: 'Maasvlakte'},
        {id: '_pGIJmXxAHk', name: 'Nieuwe Waterweg'},
        {id: 'dtFG_mcfWjQ', name: 'Noordwijk Blvd'},
        {id: 'L76VKII_Z7k', name: 'Noordwijk Vuurtoren'},
        {id: 'csMnwbjV5vg', name: 'Rockanje'},
        {id: 'A5kXiKzbBFs', name: 'Scheveningen Blvd'},
        {id: 'DaG5JReOYEw', name: 'Scheveningen Noord'},
        {id: 'Ud7I4jprFN0', name: 'Ter Heijde'},
        {id: 't3qbzZHOTyg', name: 'Wassenaarse Slag'},
        {id: 'q0-DDh1zdY4', name: 'Zandvoort Blvd'}
    ];

    const defaults = {
        1: 'A5kXiKzbBFs',
        2: 'q0-DDh1zdY4',
        3: 'KjK02QIm4ZI',
        4: 'mI1Os7TFdGc'
    };

    document.addEventListener('DOMContentLoaded', () => {
        setupSelectors();
        hardReset();
        setInterval(verversKaarten, 300000); 
    });

    function setupSelectors() {
        for (let i = 1; i <= 4; i++) {
            const sel = document.getElementById('sel-' + i);
            const defaultId = defaults[i];

            camList.forEach(cam => {
                const opt = document.createElement('option');
                opt.value = cam.id;
                opt.text = (cam.id === defaultId) ? "★ " + cam.name : cam.name;
                sel.add(opt);
            });
        }
    }

    function changeCam(pos) {
        const sel = document.getElementById('sel-' + pos);
        const id = sel.value;
        const name = sel.options[sel.selectedIndex].text.replace("★ ", "");
        setCamera(pos, id, name);
    }

    function setCamera(pos, id, name) {
        const container = document.getElementById('cont-' + pos);
        document.getElementById('lbl-' + pos).innerText = name;
        document.getElementById('sel-' + pos).value = id;
        container.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&rel=0" allow="autoplay; allowfullscreen"></iframe>`;
    }

    function hardReset() {
        for (let pos in defaults) {
            const id = defaults[pos];
            const camObj = camList.find(c => c.id === id);
            setCamera(pos, id, camObj ? camObj.name : "Camera");
        }
        verversKaarten();
    }

    function verversKaarten() {
        const nu = new Date();
        const t = nu.getTime();
        
        document.getElementById('knmi-1').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/northseamap.png?t=" + t;
        document.getElementById('knmi-2').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/waarschuwing_kust_0.gif?t=" + t;
        
        // Buienradar Animatie
        document.getElementById('radar-img').src = "https://api.buienradar.nl/image/1.0/RadarMapNL?w=350&h=350&t=" + t;
        
        const tijdStr = nu.getHours().toString().padStart(2, '0') + ":" + 
                        nu.getMinutes().toString().padStart(2, '0') + ":" + 
                        nu.getSeconds().toString().padStart(2, '0');
        
        document.getElementById('last-update').innerText = "Laatste fetch: " + tijdStr;
    }
</script>
</body>
</html>
