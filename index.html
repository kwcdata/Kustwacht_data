<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Kustwacht Dashboard</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        header { padding: 10px 20px; background: #050505; border-bottom: 1px solid #222; }
        header h1 { margin: 0; font-size: 18px; color: #00d4ff; text-transform: uppercase; letter-spacing: 2px; }
        .monitor-layout { display: grid; grid-template-columns: 1fr 360px; grid-gap: 8px; flex-grow: 1; padding: 8px; overflow: hidden; }
        .webcam-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; grid-gap: 10px; }
        .cam-box { display: flex; flex-direction: column; gap: 4px; height: 100%; }
        .slot { position: relative; background: #0a0a0a; flex-grow: 1; border-radius: 4px; overflow: hidden; border: 1px solid #222; display: flex; flex-direction: column; }
        .slot iframe { width: 100% !important; height: 100% !important; border: none; }
        .label { background: rgba(0, 212, 255, 0.85); color: #000; padding: 2px 8px; font-size: 10px; font-weight: bold; z-index: 20; text-transform: uppercase; }
        
        .info-column { display: flex; flex-direction: column; gap: 8px; height: 100%; }
        
        /* Formaat van de kaarten geoptimaliseerd */
        .fleet-card { height: 210px; background: #050505; border: 1px solid #222; border-radius: 4px; }
        .knmi-card { height: 140px; } 
        .radar-card { flex-grow: 1; min-height: 200px; }
        
        .fleet-list { padding: 5px; }
        .fleet-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 10px; border-bottom: 1px solid #1a1a1a; font-family: monospace; font-size: 12px;
            cursor: pointer;
        }
        .fleet-item:hover { background: #111; }
        .btn-track { background: #00d4ff; color: #000; border: none; padding: 2px 6px; font-size: 9px; font-weight: bold; border-radius: 2px; cursor: pointer; }
        
        .timestamp { font-size: 10px; color: #666; text-align: right; padding: 2px 5px; font-family: monospace; background: #050505; }
        .controls { background: #050505; border-top: 1px solid #222; display: flex; justify-content: center; align-items: center; height: 40px; }
        button.reset { padding: 5px 20px; background: #222; color: #bbb; border: 1px solid #444; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>
<div class="main-container">
    <header><h1>Kustwacht Dashboard</h1></header>
    <div class="monitor-layout">
        <div class="webcam-grid">
            <div class="cam-box"><div class="slot"><span class="label" id="lbl-1">L-Boven</span><div id="cont-1" style="height:100%"></div></div></div>
            <div class="cam-box"><div class="slot"><span class="label" id="lbl-2">R-Boven</span><div id="cont-2" style="height:100%"></div></div></div>
            <div class="cam-box"><div class="slot"><span class="label" id="lbl-3">L-Onder</span><div id="cont-3" style="height:100%"></div></div></div>
            <div class="cam-box"><div class="slot"><span class="label" id="lbl-4">R-Onder</span><div id="cont-4" style="height:100%"></div></div></div>
        </div>
        <div class="info-column">
            <div class="slot fleet-card">
                <span class="label">Vloot</span>
                <div id="fleet-container" class="fleet-list"></div>
            </div>

            <div class="slot knmi-card"><span class="label">Noordzee</span><img id="knmi-1" style="width:100%; height:100%; object-fit:contain;"></div>
            <div class="slot knmi-card"><span class="label">Kustwateren</span><img id="knmi-2" style="width:100%; height:100%; object-fit:contain;"></div>
            
            <div class="slot radar-card"><span class="label">Radar</span><img id="radar-img" style="width:100%; height:100%; object-fit:contain;"></div>
            
            <div id="last-update" class="timestamp">Laatste fetch: --:--:--</div>
        </div>
    </div>
    <div class="controls"><button class="reset" onclick="hardReset()">HERSTEL STANDAARD</button></div>
</div>

<script>
    const aircraft = [
        { reg: "PH-SAR", icao: "486449" },
        { reg: "PH-RSQ", icao: "48644A" },
        { reg: "PH-NCG", icao: "48644B" },
        { reg: "C-GCFK", icao: "C04A7D" },
        { reg: "C-FCGE", icao: "C005E9" }
    ];

    function initFleet() {
        const container = document.getElementById('fleet-container');
        container.innerHTML = aircraft.map(p => `
            <div class="fleet-item" onclick="trackPlane('${p.icao}', '${p.reg}')">
                <strong style="color:#00d4ff">${p.reg}</strong>
                <button class="btn-track">TRACK</button>
            </div>
        `).join('');
    }

    function trackPlane(icao, reg) {
        const url = `https://globe.adsbexchange.com/?icao=${icao}&zoom=11`;
        setCamera(2, url, `Tracking: ${reg}`);
    }

    const defaults = {
        1: 'https://m.p2kflex.nl/index.php?regio=401%3B403%3B404%3B406%3B&audio=none&include=water%3Blvo%3Bredding%3Bscheepvaart',
        2: 'https://globe.adsbexchange.com/?lat=52.955&lon=4.760&zoom=8',
        3: 'https://www.youtube.com/embed/A5kXiKzbBFs?autoplay=1&mute=1',
        4: 'https://www.youtube.com/embed/q0-DDh1zdY4?autoplay=1&mute=1'
    };

    function setCamera(pos, url, name) {
        const container = document.getElementById('cont-' + pos);
        document.getElementById('lbl-' + pos).innerText = name;
        container.innerHTML = `<iframe src="${url}" allow="autoplay; allowfullscreen"></iframe>`;
    }

    // De functie die alles ververst zonder de pagina te herladen
    function verversData() {
        const t = new Date().getTime();
        const nu = new Date();
        
        // Update de afbeeldingen met een timestamp om caching te voorkomen
        document.getElementById('knmi-1').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/northseamap.png?t=" + t;
        document.getElementById('knmi-2').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/waarschuwing_kust_0.gif?t=" + t;
        document.getElementById('radar-img').src = "https://api.buienradar.nl/image/1.0/RadarMapNL?w=350&h=350&t=" + t;
        
        // Update de fetch-tijd onderin
        const tijdStr = nu.getHours().toString().padStart(2, '0') + ":" + 
                        nu.getMinutes().toString().padStart(2, '0') + ":" + 
                        nu.getSeconds().toString().padStart(2, '0');
        document.getElementById('last-update').innerText = "Laatste fetch: " + tijdStr;
    }

    function hardReset() {
        setCamera(1, defaults[1], 'P2000 (Kustwacht)');
        setCamera(2, defaults[2], 'ADS-B Exchange');
        setCamera(3, defaults[3], 'Scheveningen Blvd');
        setCamera(4, defaults[4], 'Zandvoort Blvd');
        verversData();
    }

    document.addEventListener('DOMContentLoaded', () => { 
        initFleet();
        hardReset(); 
        // Interval op 5 minuten (300.000 ms)
        setInterval(verversData, 300000); 
    });
</script>
</body>
</html>
