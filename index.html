<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Kustwacht Dashboard</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        .main-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw; 
        }

        header {
            padding: 10px 20px;
            background: #050505;
            border-bottom: 1px solid #222;
            text-align: left;
        }

        header h1 {
            margin: 0;
            font-size: 18px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .monitor-layout { 
            display: grid; 
            grid-template-columns: 1fr 360px; 
            grid-gap: 8px; 
            flex-grow: 1; 
            padding: 8px; 
            overflow: hidden; 
        }

        .webcam-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            grid-gap: 10px; 
        }

        .cam-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
            height: 100%;
        }

        .slot { 
            position: relative; 
            background: #0a0a0a; 
            flex-grow: 1;
            border-radius: 4px; 
            overflow: hidden;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .slot iframe { 
            width: 100% !important; 
            height: 100% !important; 
            border: none; 
            background: #000;
        }

        .slot img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            background: #000; 
        }

        .label { 
            background: rgba(0, 212, 255, 0.85); 
            color: #000; padding: 2px 8px; font-size: 10px; font-weight: bold; 
            z-index: 20; text-transform: uppercase;
            display: inline-block;
            width: fit-content;
        }

        .cam-selector {
            background: #111;
            color: #ccc;
            border: 1px solid #333;
            padding: 6px;
            font-size: 11px;
            width: 100%;
            outline: none;
            border-radius: 2px;
        }

        optgroup {
            background: #222;
            color: #00d4ff;
            font-style: normal;
            font-weight: bold;
        }
        
        option {
            background: #111;
            color: #ccc;
        }

        .info-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
        }

        .knmi-card { height: 20%; }
        .radar-card { height: 35%; }
        
        .fleet-card { 
            height: 35%; 
            background: #050505;
            padding: 5px;
            display: block; 
        }
        
        .fleet-list {
            list-style: none;
            padding: 10px;
            margin: 0;
            font-size: 12px;
        }

        .fleet-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            border-bottom: 1px solid #1a1a1a;
            font-family: monospace;
        }

        .status-airborne { color: #ff3e3e; font-weight: bold; } 
        .status-ground { color: #00ff88; } 
        .status-unknown { color: #444; }

        .timestamp {
            font-size: 10px;
            color: #666;
            text-align: right;
            padding: 2px 5px;
            font-family: monospace;
        }

        .controls { 
            background: #050505; 
            border-top: 1px solid #222; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 40px; 
        }

        button { 
            padding: 5px 20px;
            background: #222; 
            color: #bbb; 
            font-weight: bold; 
            cursor: pointer; 
            border: 1px solid #444;
            border-radius: 2px;
            font-size: 11px;
        }

        button:hover { background: #00d4ff; color: #000; border-color: #00d4ff; }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>Kustwacht Dashboard</h1>
    </header>

    <div class="monitor-layout">
        <div class="webcam-grid">
            <div class="cam-box">
                <div class="slot"><span class="label" id="lbl-1">L-Boven</span><div id="cont-1" style="height:100%"></div></div>
                <select class="cam-selector" id="sel-1" onchange="changeCam(1)"></select>
            </div>
            <div class="cam-box">
                <div class="slot"><span class="label" id="lbl-2">R-Boven</span><div id="cont-2" style="height:100%"></div></div>
                <select class="cam-selector" id="sel-2" onchange="changeCam(2)"></select>
            </div>
            <div class="cam-box">
                <div class="slot"><span class="label" id="lbl-3">L-Onder</span><div id="cont-3" style="height:100%"></div></div>
                <select class="cam-selector" id="sel-3" onchange="changeCam(3)"></select>
            </div>
            <div class="cam-box">
                <div class="slot"><span class="label" id="lbl-4">R-Onder</span><div id="cont-4" style="height:100%"></div></div>
                <select class="cam-selector" id="sel-4" onchange="changeCam(4)"></select>
            </div>
        </div>

        <div class="info-column">
            <div class="slot knmi-card">
                <span class="label">Noordzee</span>
                <img id="knmi-1" src="">
            </div>
            <div class="slot knmi-card">
                <span class="label">Kust- en ruime binnenwateren</span>
                <img id="knmi-2" src="">
            </div>
            <div class="slot radar-card">
                <span class="label">Actuele Buienloop (NL)</span>
                <img id="radar-img" src="https://api.buienradar.nl/image/1.0/RadarMapNL?w=350&h=350" alt="Radar">
            </div>
            
            <div class="slot fleet-card">
                <span class="label">Vloot Status (Live via OSN)</span>
                <div id="fleet-container" class="fleet-list">
                    Data ophalen...
                </div>
            </div>

            <div id="last-update" class="timestamp">Laatste fetch: --:--:--</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="hardReset()">HERSTEL ALLE STANDAARDEN</button>
    </div>
</div>

<script>
    const aircraftList = [
        { reg: "PH-SAR", icao: "486449" },
        { reg: "PH-RSQ", icao: "48644a" },
        { reg: "PH-NCG", icao: "48644b" },
        { reg: "C-GCFK", icao: "c04a7d" },
        { reg: "C-FCGE", icao: "c005e9" }
    ];

    const sourceData = {
        systems: [
            {id: 'https://globe.adsbexchange.com/?lat=52.955&lon=4.760&zoom=8', name: 'ADS-B Exchange (Luchtvaart)', type: 'web'},
            {id: 'https://m.p2kflex.nl/index.php?regio=401%3B403%3B404%3B406%3B&audio=none&volume=75&include=water%3Blvo%3Bredding%3Bgrip%3Bscheepvaart&exclude=none&capcode=none&city=&geo=0&colors=%23F00%2C%23FF0%2C%2300F%2C%233D9%2C%233D9%2C%23F90%2C12%2C9%2C8%2C0%2C0%2C0%2C0%2C0%2C0', name: 'P2000', type: 'web'}
        ],
        webcams: [
            {id: 'KjK02QIm4ZI', name: 'Brouwersdam', type: 'yt'},
            {id: 'mI1Os7TFdGc', name: 'Egmond aan Zee', type: 'yt'},
            {id: 'jDF264Bg1_c', name: 'Hoek v Holland Blvd', type: 'yt'},
            {id: 'mnxV4iit7S4', name: 'Kijkduin Blvd', type: 'yt'},
            {id: 'Ud7I4jprFN0', name: 'Maasvlakte', type: 'yt'},
            {id: '_pGIJmXxAHk', name: 'Nieuwe Waterweg', type: 'yt'},
            {id: 'dtFG_mcfWjQ', name: 'Noordwijk Blvd', type: 'yt'},
            {id: 'L76VKII_Z7k', name: 'Noordwijk Vuurtoren', type: 'yt'},
            {id: 'csMnwbjV5vg', name: 'Rockanje', type: 'yt'},
            {id: 'A5kXiKzbBFs', name: 'Scheveningen Blvd', type: 'yt'},
            {id: 'DaG5JReOYEw', name: 'Scheveningen Noord', type: 'yt'},
            {id: 'Ud7I4jprFN0', name: 'Ter Heijde', type: 'yt'},
            {id: 't3qbzZHOTyg', name: 'Wassenaarse Slag', type: 'yt'},
            {id: 'q0-DDh1zdY4', name: 'Zandvoort Blvd', type: 'yt'}
        ]
    };

    const defaults = {
        1: 'https://m.p2kflex.nl/index.php?regio=401%3B403%3B404%3B406%3B&audio=none&volume=75&include=water%3Blvo%3Bredding%3Bgrip%3Bscheepvaart&exclude=none&capcode=none&city=&geo=0&colors=%23F00%2C%23FF0%2C%2300F%2C%233D9%2C%233D9%2C%23F90%2C12%2C9%2C8%2C0%2C0%2C0%2C0%2C0%2C0',
        2: 'https://globe.adsbexchange.com/?lat=52.955&lon=4.760&zoom=8',
        3: 'A5kXiKzbBFs',
        4: 'q0-DDh1zdY4'
    };

    document.addEventListener('DOMContentLoaded', () => {
        setupSelectors();
        hardReset();
        // Om limieten te voorkomen: ververs elke 3 minuten
        setInterval(verversData, 180000); 
    });

    function setupSelectors() {
        for (let i = 1; i <= 4; i++) {
            const sel = document.getElementById('sel-' + i);
            const defaultId = defaults[i];

            const groupSys = document.createElement('optgroup');
            groupSys.label = "Systeem Bronnen";
            sourceData.systems.forEach(item => {
                groupSys.appendChild(createOption(item, defaultId));
            });
            sel.appendChild(groupSys);

            const groupCam = document.createElement('optgroup');
            groupCam.label = "Live Webcams";
            sourceData.webcams.forEach(item => {
                groupCam.appendChild(createOption(item, defaultId));
            });
            sel.appendChild(groupCam);
        }
    }

    function createOption(item, defaultId) {
        const opt = document.createElement('option');
        opt.value = item.id;
        opt.text = (item.id === defaultId) ? "★ " + item.name : item.name;
        opt.setAttribute('data-type', item.type);
        return opt;
    }

    function changeCam(pos) {
        const sel = document.getElementById('sel-' + pos);
        const opt = sel.options[sel.selectedIndex];
        const id = opt.value;
        const type = opt.getAttribute('data-type');
        const name = opt.text.replace("★ ", "");
        setCamera(pos, id, name, type);
    }

    function setCamera(pos, id, name, type) {
        const container = document.getElementById('cont-' + pos);
        document.getElementById('lbl-' + pos).innerText = name;
        document.getElementById('sel-' + pos).value = id;
        
        let url = "";
        if (type === 'web') {
            url = id; 
        } else {
            url = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&rel=0`;
        }
        
        container.innerHTML = `<iframe src="${url}" allow="autoplay; allowfullscreen"></iframe>`;
    }

    function hardReset() {
        const allSources = [...sourceData.systems, ...sourceData.webcams];
        for (let pos in defaults) {
            const id = defaults[pos];
            const obj = allSources.find(c => c.id === id);
            if (obj) {
                setCamera(pos, id, obj.name, obj.type);
            }
        }
        verversData();
    }

    async function updateFleetStatus() {
        const fleetContainer = document.getElementById('fleet-container');
        const icaoParams = aircraftList.map(a => a.icao.toLowerCase()).join(',');
        
        // We proberen het nu met een andere proxy (Cloudflare Worker stijl)
        const targetUrl = `https://opensky-network.org/api/states/all?icao24=${icaoParams}`;
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('API/Proxy Limit');
            
            const data = await response.json();
            const states = data.states || [];

            const activeMap = {};
            states.forEach(s => {
                activeMap[s[0].toLowerCase()] = s[8]; // s[8] is on_ground
            });

            let html = "";
            aircraftList.forEach(plane => {
                const icaoLower = plane.icao.toLowerCase();
                let statusText = "OFFLINE";
                let statusClass = "status-unknown";
                
                if (icaoLower in activeMap) {
                    const onGround = activeMap[icaoLower];
                    if (!onGround) {
                        statusText = "AIRBORNE";
                        statusClass = "status-airborne";
                    } else {
                        statusText = "ON GROUND";
                        statusClass = "status-ground";
                    }
                }

                html += `<div class="fleet-item"><span>${plane.reg}</span><span class="${statusClass}">${statusText}</span></div>`;
            });
            fleetContainer.innerHTML = html;

        } catch (error) {
            console.warn("Status fetch failed, displaying last known or offline.");
            // Toon de lijst met 'Check Manual' als de API weigert
            let html = "";
            aircraftList.forEach(plane => {
                html += `<div class="fleet-item"><span>${plane.reg}</span><span class="status-unknown">NO DATA</span></div>`;
            });
            fleetContainer.innerHTML = html + "<div style='font-size:9px; color:#444; padding:5px;'>API limiet bereikt. Probeer over 15 min opnieuw.</div>";
        }
    }

    function verversData() {
        const nu = new Date();
        const t = nu.getTime();
        
        document.getElementById('knmi-1').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/northseamap.png?t=" + t;
        document.getElementById('knmi-2').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/waarschuwing_kust_0.gif?t=" + t;
        document.getElementById('radar-img').src = "https://api.buienradar.nl/image/1.0/RadarMapNL?w=350&h=350&t=" + t;
        
        updateFleetStatus();

        const tijdStr = nu.getHours().toString().padStart(2, '0') + ":" + 
                        nu.getMinutes().toString().padStart(2, '0') + ":" + 
                        nu.getSeconds().toString().padStart(2, '0');
        
        document.getElementById('last-update').innerText = "Laatste fetch: " + tijdStr;
    }
</script>
</body>
</html>
