<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Kustwacht Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/kwcdata/Kustwacht_data/refs/heads/main/kustwacht-logo.svg">
    
    <style>
        :root {
            --brand-color: #4df2ff; 
            --bg-dark: #1e252b;    
            --bg-black: #0d1117;   
            --text-main: #ffffff;
            --border-color: #30363d;
        }

        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: var(--bg-black); color: var(--text-main); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        header { 
            padding: 5px 20px; background: var(--bg-dark); border-bottom: 1px solid var(--border-color); 
            display: flex; justify-content: space-between; align-items: center; height: 35px; flex-shrink: 0;
        }
        .header-title-area { display: flex; align-items: center; gap: 12px; }
        .header-logo { height: 28px; width: auto; }
        header h1 { margin: 0; font-size: 16px; color: var(--brand-color); text-transform: uppercase; letter-spacing: 2px; }
        
        .header-info-area { display: flex; align-items: center; gap: 25px; }
        .clocks { display: flex; gap: 20px; font-family: 'Courier New', monospace; }
        .clock-item { text-align: right; }
        .clock-label { font-size: 8px; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: -2px; }
        .clock-time { font-size: 14px; color: var(--brand-color); font-weight: bold; }
        
        .fetch-display { font-family: 'Courier New', monospace; text-align: right; border-left: 1px solid var(--border-color); padding-left: 20px; }
        .fetch-label { font-size: 8px; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: -2px; }
        .fetch-time { font-size: 12px; color: #c9d1d9; font-weight: bold; }

        .nav-bar { 
            background: var(--bg-dark); border-bottom: 1px solid var(--border-color); 
            display: flex; padding: 0 10px; z-index: 1000; align-items: center; justify-content: space-between; flex-shrink: 0; min-height: 28px;
        }
        .nav-links-wrapper { display: flex; flex-wrap: wrap; align-items: center; flex-grow: 1; }
        .nav-group { position: relative; padding: 5px 10px; cursor: pointer; font-size: 10px; font-weight: bold; color: #c9d1d9; text-transform: uppercase; white-space: nowrap; }
        .nav-group:hover { background: #30363d; color: var(--brand-color); }
        .dropdown { display: none; position: absolute; top: 100%; left: 0; background: #161b22; border: 1px solid var(--border-color); min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.8); max-height: 75vh; overflow-y: auto; overflow-x: hidden; }
        .nav-group:hover .dropdown { display: block; }
        .dropdown a, .dropdown button { color: #c9d1d9; padding: 8px 12px; text-decoration: none; display: block; font-size: 11px; border-bottom: 1px solid var(--border-color); width: 100%; text-align: left; background: none; border: none; cursor: pointer; font-family: inherit; }
        .dropdown a:hover, .dropdown button:hover { background: var(--brand-color); color: #000; }

        .nav-controls { display: flex; align-items: center; gap: 10px; flex-shrink: 0; padding: 2px 0; }
        button.reset-nav { padding: 2px 8px; background: #21262d; color: #c9d1d9; border: 1px solid var(--border-color); cursor: pointer; font-size: 9px; font-weight: bold; text-transform: uppercase; border-radius: 3px; }

        .monitor-layout { display: grid; grid-template-columns: 1fr 360px; grid-gap: 8px; flex-grow: 1; padding: 8px; overflow: hidden; }
        
        /* FIX: Verhoudingen worden geforceerd door de rows op 1fr te houden */
        .webcam-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(2, minmax(0, 1fr)); grid-gap: 10px; position: relative; }
        
        .cam-box { display: flex; flex-direction: column; gap: 4px; height: 100%; min-height: 0; overflow: hidden; }
        .cam-box.full-slot { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; background: var(--bg-black); padding: 8px; box-sizing: border-box; }

        .slot { position: relative; background: #0d1117; border-radius: 4px; overflow: hidden; border: 1px solid var(--border-color); display: flex; flex-direction: column; flex-grow: 1; min-height: 0; }
        .slot iframe { flex-grow: 1; width: 100%; border: none; background: #000; }
        
        .label { background: var(--brand-color); color: #000; padding: 2px 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; display: block; flex-shrink: 0; z-index: 10; }
        
        /* RSS Feed Styling */
        .rss-container { flex-grow: 1; overflow-y: auto; background: #000; padding: 10px; box-sizing: border-box; }
        .rss-item { border-bottom: 1px solid #222; padding: 8px 0; cursor: pointer; }
        .rss-item:hover { background: #161b22; }
        .rss-title { color: var(--brand-color); font-size: 12px; font-weight: bold; display: block; margin-bottom: 3px; }
        .rss-meta { color: #8b949e; font-size: 10px; }

        .cam-footer { display: flex; gap: 4px; align-items: center; height: 26px; flex-shrink: 0; }
        .cam-selector { background: #161b22; color: #c9d1d9; border: 1px solid var(--border-color); padding: 4px; font-size: 11px; outline: none; border-radius: 2px; flex-grow: 1; }
        .expand-btn { background: #161b22; color: var(--brand-color); border: 1px solid var(--border-color); padding: 0 8px; cursor: pointer; font-size: 14px; border-radius: 2px; height: 26px; display: flex; align-items: center; justify-content: center; }

        .info-column { display: flex; flex-direction: column; gap: 8px; height: 100%; overflow: hidden; }
        .info-column .slot { flex: 1; min-height: 0; }
        .img-container { flex: 1; position: relative; overflow: hidden; background: #000; }
        .info-column img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; background: #000; }

        #p2k-notification-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .p2k-toast { background: rgba(22, 27, 34, 0.95); border-left: 4px solid var(--brand-color); color: white; padding: 12px; border-radius: 4px; width: 300px; border: 1px solid var(--border-color); pointer-events: auto; cursor: pointer; animation: slideIn 0.5s ease-out; }
        .p2k-toast.urgency { border-left-color: #ff4444; background: rgba(60, 0, 0, 0.95); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="p2k-notification-container"></div>

<div class="main-container">
    <header>
        <div class="header-title-area">
            <img src="https://raw.githubusercontent.com/kwcdata/Kustwacht_data/refs/heads/main/kustwacht-logo.svg" alt="Kustwacht Logo" class="header-logo">
            <h1>Kustwacht Dashboard</h1>
        </div>
        <div class="header-info-area">
            <div class="clocks">
                <div class="clock-item"><span class="clock-label">Lokaal (NL)</span><span id="local-clock" class="clock-time">00:00:00</span></div>
                <div class="clock-item"><span class="clock-label">Zulu (UTC)</span><span id="zulu-clock" class="clock-time">00:00:00</span></div>
            </div>
            <div class="fetch-display">
                <span class="fetch-label">Data Update</span>
                <span id="last-update" class="fetch-time">--:--:--</span>
            </div>
        </div>
    </header>

    <nav class="nav-bar">
        <div class="nav-links-wrapper" id="nav-bar-links"></div>
        <div class="nav-controls">
            <div class="nav-group" style="color:var(--brand-color); border-left: 1px solid var(--border-color);">VLOOT TRACKING ▾
                <div class="dropdown" id="fleet-dropdown"></div>
            </div>
            <span id="p2k-status" style="font-size: 9px; color: #444; text-transform: uppercase;">Monitor: Actief</span>
            <button class="reset-nav" onclick="hardReset()">Herstel Standaard</button>
        </div>
    </nav>

    <div class="monitor-layout">
        <div class="webcam-grid">
            <div class="cam-box" id="box-1">
                <div class="slot"><span class="label" id="lbl-1">L-Boven</span><div id="cont-1" style="height:100%;"></div></div>
                <div class="cam-footer"><select class="cam-selector" id="sel-1" onchange="changeCam(1)"></select><button class="expand-btn" onclick="toggleFullscreen(1)">⛶</button></div>
            </div>
            <div class="cam-box" id="box-2">
                <div class="slot"><span class="label" id="lbl-2">R-Boven</span><div id="cont-2" style="height:100%;"></div></div>
                <div class="cam-footer"><select class="cam-selector" id="sel-2" onchange="changeCam(2)"></select><button class="expand-btn" onclick="toggleFullscreen(2)">⛶</button></div>
            </div>
            <div class="cam-box" id="box-3">
                <div class="slot"><span class="label" id="lbl-3">L-Onder</span><div id="cont-3" style="height:100%;"></div></div>
                <div class="cam-footer"><select class="cam-selector" id="sel-3" onchange="changeCam(3)"></select><button class="expand-btn" onclick="toggleFullscreen(3)">⛶</button></div>
            </div>
            <div class="cam-box" id="box-4">
                <div class="slot"><span class="label" id="lbl-4">R-Onder</span><div id="cont-4" style="height:100%;"></div></div>
                <div class="cam-footer"><select class="cam-selector" id="sel-4" onchange="changeCam(4)"></select><button class="expand-btn" onclick="toggleFullscreen(4)">⛶</button></div>
            </div>
        </div>
        <div class="info-column">
            <div class="slot"><span class="label">Noordzee</span><div class="img-container"><img id="knmi-1"></div></div>
            <div class="slot"><span class="label">Kust- en binnenwateren</span><div class="img-container"><img id="knmi-2"></div></div>
            <div class="slot"><span class="label">Radar</span><div class="img-container"><img id="radar-img"></div></div>
        </div>
    </div>
</div>

<script>
    const aircraft = [
        { reg: "PH-SAR", icao: "486449" }, { reg: "PH-RSQ", icao: "48644A" },
        { reg: "PH-NCG", icao: "48644B" }, { reg: "C-GCFK", icao: "C04A7D" }, { reg: "C-FCGE", icao: "C005E9" }
    ];

    const sourceData = {
        systems: [
            {id: 'https://m.p2kflex.nl/index.php?regio=401%3B403%3B404%3B406%3B&audio=none&volume=75&include=water%3Blvo%3Bredding%3Bgrip%3Bscheepvaart&exclude=none&capcode=none&city=&geo=0', name: 'P2000 (Kustwacht)', type: 'web'},
            {id: 'https://feeds.nos.nl/nosnieuwsalgemeen', name: 'NOS Nieuws (RSS)', type: 'rss'},
            {id: 'https://globe.adsbexchange.com/?lat=52.955&lon=4.760&zoom=8', name: 'ADS-B Exchange', type: 'web'}
        ],
        webcams: [
            {id: 'A5kXiKzbBFs', name: 'Scheveningen Blvd', type: 'yt'},
            {id: 'q0-DDh1zdY4', name: 'Zandvoort Blvd', type: 'yt'},
            {id: 'mI1Os7TFdGc', name: 'Egmond aan Zee', type: 'yt'},
            {id: 'Ud7I4jprFN0', name: 'Maasvlakte', type: 'yt'},
            {id: 'jDF264Bg1_c', name: 'Hoek v Holland Blvd', type: 'yt'},
            {id: 'mnxV4iit7S4', name: 'Kijkduin Blvd', type: 'yt'},
            {id: 'KjK02QIm4ZI', name: 'Brouwersdam', type: 'yt'}
        ]
    };

    // Standaard instellingen: Box 2 is nu de RSS feed
    const defaults = { 1: sourceData.systems[0].id, 2: sourceData.systems[1].id, 3: 'A5kXiKzbBFs', 4: 'q0-DDh1zdY4' };
    
    function updateClocks() {
        const nu = new Date();
        document.getElementById('local-clock').innerText = nu.toLocaleTimeString('nl-NL', { hour12: false });
        document.getElementById('zulu-clock').innerText = nu.toLocaleTimeString('nl-NL', { timeZone: 'UTC', hour12: false });
    }

    async function fetchRSS(url, pos) {
        const container = document.getElementById('cont-' + pos);
        container.innerHTML = '<div style="padding:15px; color:#888;">Laden...</div>';
        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
            const data = await response.json();
            if (data.status === 'ok') {
                container.innerHTML = `<div class="rss-container">` + data.items.map(item => `
                    <div class="rss-item" onclick="window.open('${item.link}', '_blank')">
                        <span class="rss-title">${item.title}</span>
                        <span class="rss-meta">${new Date(item.pubDate).toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'})} - ${data.feed.title}</span>
                    </div>`).join('') + `</div>`;
            }
        } catch (e) { container.innerHTML = '<div style="padding:15px; color:red;">RSS Fout</div>'; }
    }

    function setCamera(pos, id, name, type) {
        const container = document.getElementById('cont-' + pos);
        if (type === 'rss') {
            fetchRSS(id, pos);
        } else if (type === 'web') {
            container.innerHTML = `<iframe src="${id}" allow="autoplay; allowfullscreen"></iframe>`;
        } else {
            container.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&rel=0" allow="autoplay; allowfullscreen"></iframe>`;
        }
        document.getElementById('lbl-' + pos).innerText = name.replace("★ ", "");
    }

    function changeCam(pos) {
        const sel = document.getElementById('sel-' + pos);
        const id = sel.value;
        const name = sel.options[sel.selectedIndex].text;
        const system = sourceData.systems.find(s => s.id === id);
        setCamera(pos, id, name, system ? system.type : 'yt');
    }

    function setupSelectors() {
        for (let i = 1; i <= 4; i++) {
            const sel = document.getElementById('sel-' + i);
            sel.innerHTML = '';
            const g1 = document.createElement('optgroup'); g1.label = "SYSTEMEN";
            sourceData.systems.forEach(s => sel.add(new Option((s.id === defaults[i] ? "★ " : "") + s.name, s.id)));
            const g2 = document.createElement('optgroup'); g2.label = "WEBCAMS";
            sourceData.webcams.forEach(w => sel.add(new Option((w.id === defaults[i] ? "★ " : "") + w.name, w.id)));
            sel.value = defaults[i];
        }
    }

    function verversData() {
        const t = new Date().getTime();
        document.getElementById('knmi-1').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/northseamap.png?t=" + t;
        document.getElementById('knmi-2').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/waarschuwing_kust_0.gif?t=" + t;
        document.getElementById('radar-img').src = "https://api.buienradar.nl/image/1.0/RadarMapNL?w=350&h=350&r=" + t;
        document.getElementById('last-update').innerText = new Date().toLocaleTimeString('nl-NL', { hour12: false });
    }

    function toggleFullscreen(pos) {
        document.getElementById('box-' + pos).classList.toggle('full-slot');
    }

    function hardReset() {
        for(let p in defaults) {
            const id = defaults[p];
            const item = [...sourceData.systems, ...sourceData.webcams].find(x => x.id === id);
            setCamera(p, id, item.name, sourceData.systems.find(s => s.id === id)?.type || 'yt');
            document.getElementById('sel-'+p).value = id;
        }
    }

    // Navigatie & Fleet menu initialisatie (hergebruikt van vorige versie)
    function initMenus() {
        document.getElementById('nav-bar-links').innerHTML = [
            { title: "SAR", links: [{ name: "Amver", url: "http://www.amver.com" }, { name: "LCMS", url: "https://mijn.lcms.nl" }] },
            { title: "Overheid", links: [{ name: "KNMI", url: "https://mijn.knmi.nl" }] }
        ].map(g => `<div class="nav-group">${g.title} ▾ <div class="dropdown">${g.links.map(l => `<a href="${l.url}" target="_blank">${l.name}</a>`).join('')}</div></div>`).join('');
        
        document.getElementById('fleet-dropdown').innerHTML = aircraft.map(p => `<button onclick="setCamera(2, 'https://globe.adsbexchange.com/?icao=${p.icao}&zoom=11', 'Track: ${p.reg}', 'web')">Track: ${p.reg}</button>`).join('');
    }

    document.addEventListener('DOMContentLoaded', () => { 
        setupSelectors(); initMenus(); hardReset(); updateClocks();
        setInterval(updateClocks, 1000); setInterval(verversData, 300000); verversData();
    });
</script>
</body>
</html>
