<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Kustwacht Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/kwcdata/Kustwacht_data/refs/heads/main/kustwacht-logo.svg">
    
    <style>
        :root {
            --brand-color: #4df2ff; 
            --bg-dark: #1e252b;    
            --bg-black: #0d1117;   
            --text-main: #ffffff;
            --border-color: #30363d;
        }

        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: var(--bg-black); color: var(--text-main); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        header { 
            padding: 2px 15px; background: var(--bg-dark); border-bottom: 1px solid var(--border-color); 
            display: flex; justify-content: space-between; align-items: center; height: 45px; flex-shrink: 0;
        }
        .header-title-area { display: flex; align-items: center; gap: 10px; }
        .header-logo { height: 32px; width: auto; }
        header h1 { margin: 0; font-size: 13px; color: var(--brand-color); text-transform: uppercase; letter-spacing: 1px; }
        
        .header-info-area { display: flex; align-items: center; gap: 20px; }
        .clocks { display: flex; gap: 15px; font-family: 'Courier New', monospace; }
        .clock-item { display: flex; align-items: baseline; gap: 6px; } 
        .clock-label { font-size: 9px; color: #8b949e; text-transform: uppercase; font-weight: bold; }
        .clock-time { font-size: 26px; color: var(--brand-color); font-weight: 800; line-height: 1; }
        .fetch-time { font-family: 'Courier New', monospace; font-size: 16px; color: #c9d1d9; font-weight: bold; border-left: 1px solid var(--border-color); padding-left: 15px; }

        .nav-bar { 
            background: var(--bg-dark); border-bottom: 1px solid var(--border-color); 
            display: flex; padding: 0 10px; z-index: 1000; align-items: center; justify-content: space-between; flex-shrink: 0; min-height: 28px;
        }
        .nav-links-wrapper { display: flex; flex-wrap: wrap; align-items: center; flex-grow: 1; }
        .nav-group { position: relative; padding: 4px 10px; cursor: pointer; font-size: 10px; font-weight: bold; color: #c9d1d9; text-transform: uppercase; white-space: nowrap; }
        .nav-group:hover { background: #30363d; color: var(--brand-color); }
        .dropdown { display: none; position: absolute; top: 100%; left: 0; background: #161b22; border: 1px solid var(--border-color); min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.8); max-height: 80vh; overflow-y: auto; z-index: 2000; }
        .nav-group:hover .dropdown { display: block; }
        .dropdown a, .dropdown button { color: #c9d1d9; padding: 8px 12px; text-decoration: none; display: block; font-size: 11px; border-bottom: 1px solid var(--border-color); width: 100%; text-align: left; background: none; border: none; cursor: pointer; font-family: inherit; }
        .dropdown a:hover, .dropdown button:hover { background: var(--brand-color); color: #000; }

        /* Aangepaste verhoudingen layout */
        .monitor-layout { 
            display: grid; 
            grid-template-columns: 1fr 20%; /* Rechterkolom nu relatief ipv vast 360px */
            grid-gap: 6px; 
            flex-grow: 1; 
            padding: 6px; 
            overflow: hidden; 
        }
        
        .webcam-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            grid-gap: 8px; 
        }
        
        .cam-box { display: flex; flex-direction: column; height: 100%; min-height: 0; }
        .slot { position: relative; background: #000; border-radius: 2px; overflow: hidden; border: 1px solid var(--border-color); display: flex; flex-direction: column; flex-grow: 1; }
        .slot iframe { width: 100%; height: 100%; border: none; flex-grow: 1; }
        
        .label { background: var(--brand-color); color: #000; padding: 2px 8px; font-size: 11px; font-weight: 900; text-transform: uppercase; flex-shrink: 0; letter-spacing: 0.5px; }
        
        .cam-footer { display: flex; gap: 2px; align-items: center; height: 24px; flex-shrink: 0; background: #161b22; }
        .cam-selector { background: transparent; color: #c9d1d9; border: none; padding: 2px 5px; font-size: 10px; outline: none; flex-grow: 1; cursor: pointer; }
        .expand-btn { background: transparent; color: var(--brand-color); border: none; border-left: 1px solid var(--border-color); padding: 0 10px; cursor: pointer; font-size: 14px; height: 100%; }

        .news-feed { background: #000; padding: 10px; overflow-y: auto; flex-grow: 1; height: 100%; box-sizing: border-box; }
        .news-item { padding: 8px 0; border-bottom: 1px solid #222; cursor: pointer; }
        .news-item:hover { background: #161b22; }
        .news-title { color: var(--brand-color); font-weight: bold; font-size: 11px; display: block; }
        .news-meta { color: #8b949e; font-size: 9px; }

        .info-column { display: flex; flex-direction: column; gap: 6px; height: 100%; overflow: hidden; }
        .info-column .slot { flex: 1; min-height: 0; }
        .img-container { flex: 1; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
        .info-column img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; }

        .cam-box.full-slot { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5000; background: var(--bg-black); padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <div class="header-title-area">
            <img src="https://raw.githubusercontent.com/kwcdata/Kustwacht_data/refs/heads/main/kustwacht-logo.svg" class="header-logo">
            <h1>Kustwacht Dashboard</h1>
        </div>
        <div class="header-info-area">
            <div class="clocks">
                <div class="clock-item"><span class="clock-label">Lokaal</span><span id="local-clock" class="clock-time">00:00:00</span></div>
                <div class="clock-item"><span class="clock-label">Zulu</span><span id="zulu-clock" class="clock-time">00:00:00</span></div>
            </div>
            <span id="last-update" class="fetch-time">--:--:--</span>
        </div>
    </header>

    <nav class="nav-bar">
        <div class="nav-links-wrapper" id="nav-bar-links"></div>
        <div class="nav-controls" style="display:flex; align-items:center; gap:10px;">
            <div class="nav-group" style="color:var(--brand-color)">VLOOT TRACKING ▾
                <div class="dropdown" id="fleet-dropdown"></div>
            </div>
            <button onclick="location.reload()" style="background:#21262d; color:#c9d1d9; border:1px solid var(--border-color); font-size:9px; cursor:pointer; padding:3px 8px; border-radius:3px;">RESET</button>
        </div>
    </nav>

    <div class="monitor-layout">
        <div class="webcam-grid">
            <div class="cam-box" id="box-1">
                <div class="slot"><span class="label" id="lbl-1">L-Boven</span><div id="cont-1" style="height:100%; display:flex; flex-direction:column;"></div></div>
                <div class="cam-footer"><select class="cam-selector" id="sel-1" onchange="changeCam(1)"></select><button class="expand-btn" onclick="toggleFullscreen(1)">⛶</button></div>
            </div>
            <div class="cam-box" id="box-2">
                <div class="slot"><span class="label" id="lbl-2">R-Boven</span><div id="cont-2" style="height:100%; display:flex; flex-direction:column;"></div></div>
                <div class="cam-footer"><select class="cam-selector" id="sel-2" onchange="changeCam(2)"></select><button class="expand-btn" onclick="toggleFullscreen(2)">⛶</button></div>
            </div>
            <div class="cam-box" id="box-3">
                <div class="slot"><span class="label" id="lbl-3">L-Onder</span><div id="cont-3" style="height:100%; display:flex; flex-direction:column;"></div></div>
                <div class="cam-footer"><select class="cam-selector" id="sel-3" onchange="changeCam(3)"></select><button class="expand-btn" onclick="toggleFullscreen(3)">⛶</button></div>
            </div>
            <div class="cam-box" id="box-4">
                <div class="slot"><span class="label" id="lbl-4">R-Onder</span><div id="cont-4" style="height:100%; display:flex; flex-direction:column;"></div></div>
                <div class="cam-footer"><select class="cam-selector" id="sel-4" onchange="changeCam(4)"></select><button class="expand-btn" onclick="toggleFullscreen(4)">⛶</button></div>
            </div>
        </div>
        <div class="info-column">
            <div class="slot"><span class="label">Noordzee</span><div class="img-container"><img id="knmi-1"></div></div>
            <div class="slot"><span class="label">Kust wateren</span><div class="img-container"><img id="knmi-2"></div></div>
            <div class="slot"><span class="label">Radar</span><div class="img-container"><img id="radar-img"></div></div>
        </div>
    </div>
</div>

<script>
    const aircraft = [
        { reg: "PH-SAR", icao: "486449" }, { reg: "PH-RSQ", icao: "48644A" }, { reg: "PH-NCG", icao: "48644B" }, { reg: "C-GCFK", icao: "C04A7D" }, { reg: "C-FCGE", icao: "C005E9" }
    ];

    const bookmarkGroups = [
        { title: "SAR", links: [
            { name: "Amver (surpic)", url: "http://www.amver.com/Forms/SurpicRequest" },
            { name: "LCMS", url: "https://mijn.lcms.nl/gebruikersbeheer/#/login" },
            { name: "ISAR Bristow", url: "https://isar.im/" },
            { name: "P2kflex", url: "https://expert.p2kflex.nl/index.php?regio=403%3B404%3B&audio=&volume=75&include=knrm%3Bkustwacht%3Bredding%3Bwater%3Bgrip" },
            { name: "Winnies P2000", url: "https://winnies.livep2000.nl/" }
        ]},
        { title: "Overheid", links: [
            { name: "RWsOS Viewer", url: "https://rwsos.rws.nl/viewer/map/noordzee/waterkwantiteit" },
            { name: "Waterberichtgeving", url: "https://waterberichtgeving.rws.nl/owb/home" },
            { name: "KNMI extranet", url: "https://mijn.knmi.nl" },
            { name: "Noordzeeloket", url: "https://www.noordzeeloket.nl/" }
        ]},
        { title: "AIS/Lucht", links: [
            { name: "VIIA", url: "https://viia-p.kustwacht.nl/" },
            { name: "ADS-B Exchange", url: "https://globe.adsbexchange.com/" },
            { name: "Flightradar24", url: "https://www.flightradar24.com/" },
            { name: "SkyVector", url: "https://skyvector.com/" }
        ]}
    ];

    const sourceData = {
        systems: [
            {id: 'https://m.p2kflex.nl/index.php?regio=401%3B403%3B404%3B406%3B&audio=none&include=water%3Blvo%3Bredding%3Bgrip%3Bscheepvaart', name: 'P2000 (Kustwacht)', type: 'web'},
            {id: 'news_api', name: 'NOS Nieuws (Live)', type: 'news'},
            {id: 'https://globe.adsbexchange.com/?lat=52.955&lon=4.760&zoom=8', name: 'ADS-B Exchange', type: 'web'}
        ],
        webcams: [
            {id: 'A5kXiKzbBFs', name: 'Scheveningen Blvd', type: 'yt'},
            {id: 'q0-DDh1zdY4', name: 'Zandvoort Blvd', type: 'yt'},
            {id: 'mI1Os7TFdGc', name: 'Egmond aan Zee', type: 'yt'},
            {id: 'Ud7I4jprFN0', name: 'Maasvlakte', type: 'yt'},
            {id: 'jDF264Bg1_c', name: 'Hoek v Holland Blvd', type: 'yt'},
            {id: 'mnxV4iit7S4', name: 'Kijkduin Blvd', type: 'yt'}
        ]
    };

    const posFavorites = { 1: sourceData.systems[0].id, 2: 'news_api', 3: 'A5kXiKzbBFs', 4: 'q0-DDh1zdY4' };

    function updateClocks() {
        const nu = new Date();
        document.getElementById('local-clock').innerText = nu.toLocaleTimeString('nl-NL', { hour12: false });
        document.getElementById('zulu-clock').innerText = nu.toLocaleTimeString('nl-NL', { hour12: false, timeZone: 'UTC' });
    }

    async function fetchNews(containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '<div style="padding:15px; color:#888;">Nieuws laden...</div>';
        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Ffeeds.nos.nl%2Fnosnieuwsalgemeen');
            const data = await res.json();
            if(data.status === 'ok') {
                container.innerHTML = `<div class="news-feed">` + data.items.map(item => `
                    <div class="news-item" onclick="window.open('${item.link}', '_blank')">
                        <span class="news-title">${item.title}</span>
                        <span class="news-meta">${new Date(item.pubDate).toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'})} - NOS</span>
                    </div>`).join('') + `</div>`;
            }
        } catch (e) { container.innerHTML = "Fout bij nieuws laden."; }
    }

    function setCamera(pos, id, name, type) {
        const container = document.getElementById('cont-' + pos);
        if (type === 'news') {
            container.innerHTML = `<div id="news-box-${pos}" class="news-feed"></div>`;
            fetchNews(`news-box-${pos}`);
        } else if (type === 'web') {
            container.innerHTML = `<iframe src="${id}"></iframe>`;
        } else {
            container.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&rel=0"></iframe>`;
        }
        document.getElementById('lbl-' + pos).innerText = name.replace("★ ", "");
    }

    function changeCam(pos) {
        const sel = document.getElementById('sel-' + pos);
        const opt = sel.options[sel.selectedIndex];
        setCamera(pos, sel.value, opt.text, opt.dataset.type);
    }

    function trackPlane(icao, reg) { setCamera(2, `https://globe.adsbexchange.com/?icao=${icao}&zoom=11`, `Tracking: ${reg}`, 'web'); }

    function setupSelectors() {
        for (let i = 1; i <= 4; i++) {
            const sel = document.getElementById('sel-' + i);
            sel.innerHTML = '';
            const g1 = document.createElement('optgroup'); g1.label = "SYSTEMEN";
            sourceData.systems.forEach(s => {
                const opt = new Option((s.id === posFavorites[i] ? "★ " : "") + s.name, s.id);
                opt.dataset.type = s.type; g1.appendChild(opt);
            });
            const g2 = document.createElement('optgroup'); g2.label = "WEBCAMS";
            sourceData.webcams.forEach(w => {
                const opt = new Option((w.id === posFavorites[i] ? "★ " : "") + w.name, w.id);
                opt.dataset.type = 'yt'; g2.appendChild(opt);
            });
            sel.appendChild(g1); sel.appendChild(g2); sel.value = posFavorites[i];
        }
    }

    function verversData() {
        const t = new Date().getTime();
        document.getElementById('knmi-1').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/northseamap.png?t=" + t;
        document.getElementById('knmi-2').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/waarschuwing_kust_0.gif?t=" + t;
        document.getElementById('radar-img').src = "https://api.buienradar.nl/image/1.0/RadarMapNL?w=350&h=350&t=" + t;
        document.querySelectorAll('[id^="news-box-"]').forEach(box => fetchNews(box.id));
        document.getElementById('last-update').innerText = new Date().toLocaleTimeString('nl-NL', { hour12: false });
    }

    function toggleFullscreen(pos) { document.getElementById('box-' + pos).classList.toggle('full-slot'); }

    document.addEventListener('DOMContentLoaded', () => { 
        document.getElementById('nav-bar-links').innerHTML = bookmarkGroups.map(g => `<div class="nav-group">${g.title} ▾ <div class="dropdown">${g.links.map(l => `<a href="${l.url}" target="_blank">${l.name}</a>`).join('')}</div></div>`).join('');
        document.getElementById('fleet-dropdown').innerHTML = aircraft.map(p => `<button onclick="trackPlane('${p.icao}', '${p.reg}')">Track: ${p.reg}</button>`).join('');
        setupSelectors(); updateClocks();
        for(let i=1; i<=4; i++) changeCam(i);
        setInterval(updateClocks, 1000); setInterval(verversData, 300000); verversData();
    });
</script>
</body>
</html>
