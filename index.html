<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Kustwacht Dashboard</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        header { 
            padding: 10px 20px; 
            background: #050505; 
            border-bottom: 1px solid #222; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            height: 50px;
        }
        header h1 { margin: 0; font-size: 18px; color: #00d4ff; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Weerwaarschuwing styling */
        #weather-status-bar {
            position: relative;
            cursor: help;
            font-weight: bold;
            font-size: 14px;
            padding: 5px 15px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            transition: all 0.5s;
        }

        .code-groen { color: #00ff00; border-color: #00ff00; box-shadow: inset 0 0 5px rgba(0,255,0,0.2); }
        .code-geel { color: #ffff00; border-color: #ffff00; text-shadow: 0 0 10px rgba(255,255,0,0.5); }
        .code-oranje { color: #ff9900; border-color: #ff9900; text-shadow: 0 0 10px rgba(255,153,0,0.5); }
        .code-rood { color: #ff0000; border-color: #ff0000; text-shadow: 0 0 15px rgba(255,0,0,0.7); animation: pulse 2s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .weather-map-popover {
            display: none;
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            background: #111;
            border: 2px solid #444;
            padding: 5px;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            border-radius: 4px;
        }
        #weather-status-bar:hover .weather-map-popover { display: block; }
        .weather-map-popover img { width: 100%; border-radius: 2px; display: block; }

        .clocks { display: flex; gap: 20px; font-family: 'Courier New', monospace; }
        .clock-item { text-align: right; }
        .clock-label { font-size: 9px; color: #666; text-transform: uppercase; display: block; margin-bottom: -2px; }
        .clock-time { font-size: 16px; color: #00d4ff; font-weight: bold; }

        .nav-bar { background: #111; border-bottom: 1px solid #222; display: flex; padding: 0 10px; z-index: 1000; flex-wrap: wrap; }
        .nav-group { position: relative; padding: 8px 12px; cursor: pointer; font-size: 11px; font-weight: bold; color: #ccc; text-transform: uppercase; white-space: nowrap; }
        .nav-group:hover { background: #222; color: #00d4ff; }
        .dropdown { display: none; position: absolute; top: 100%; left: 0; background: #1a1a1a; border: 1px solid #333; min-width: 240px; box-shadow: 0 8px 16px rgba(0,0,0,0.8); max-height: 70vh; overflow-y: auto; }
        .nav-group:hover .dropdown { display: block; }
        .nav-group:last-child .dropdown { left: auto; right: 0; }
        .dropdown a { color: #ccc; padding: 8px 12px; text-decoration: none; display: block; font-size: 11px; border-bottom: 1px solid #222; }
        .dropdown a:hover { background: #00d4ff; color: #000; }

        .monitor-layout { display: grid; grid-template-columns: 1fr 360px; grid-gap: 8px; flex-grow: 1; padding: 8px; overflow: hidden; }
        .webcam-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; grid-gap: 10px; }
        .cam-box { display: flex; flex-direction: column; gap: 4px; height: 100%; }
        .slot { position: relative; background: #0a0a0a; flex-grow: 1; border-radius: 4px; overflow: hidden; border: 1px solid #222; display: flex; flex-direction: column; }
        .slot iframe { width: 100% !important; height: 100% !important; border: none; background: #000; }
        .label { background: rgba(0, 212, 255, 0.85); color: #000; padding: 2px 8px; font-size: 10px; font-weight: bold; z-index: 20; text-transform: uppercase; }
        
        .cam-selector { background: #111; color: #ccc; border: 1px solid #333; padding: 4px; font-size: 11px; outline: none; border-radius: 2px; }
        .info-column { display: flex; flex-direction: column; gap: 8px; height: 100%; }
        
        /* GEOPTIMALISEERDE HOOGTES */
        .fleet-card { height: 145px; background: #050505; border: 1px solid #222; border-radius: 4px; }
        .knmi-card { height: 155px; } 
        .radar-card { flex-grow: 1; min-height: 180px; }
        
        .list-container { padding: 2px 5px; }
        .fleet-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 10px; border-bottom: 1px solid #1a1a1a; font-family: monospace; font-size: 12px; }
        .btn-track { background: #00d4ff; color: #000; border: none; padding: 2px 6px; font-size: 9px; font-weight: bold; border-radius: 2px; cursor: pointer; }
        
        .timestamp { font-size: 10px; color: #444; text-align: right; padding: 4px 5px; font-family: monospace; }
        .controls { background: #050505; border-top: 1px solid #222; display: flex; justify-content: center; align-items: center; height: 40px; }
        button.reset { padding: 5px 20px; background: #222; color: #bbb; border: 1px solid #444; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>
<div class="main-container">
    <header>
        <h1>Kustwacht Dashboard</h1>
        
        <div id="weather-status-bar" class="code-groen">
            <span id="status-text">STATUS: CODE GROEN</span>
            <div class="weather-map-popover">
                <img id="popover-map" src="https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/waarschuwing_land_0.gif" alt="KNMI Waarschuwingen">
            </div>
        </div>

        <div class="clocks">
            <div class="clock-item"><span class="clock-label">Lokaal (NL)</span><span id="local-clock" class="clock-time">00:00:00</span></div>
            <div class="clock-item"><span class="clock-label">Zulu (UTC)</span><span id="zulu-clock" class="clock-time">00:00:00</span></div>
        </div>
    </header>

    <nav class="nav-bar" id="nav-bar"></nav>

    <div class="monitor-layout">
        <div class="webcam-grid">
            <div class="cam-box"><div class="slot"><span class="label" id="lbl-1">L-Boven</span><div id="cont-1" style="height:100%"></div></div><select class="cam-selector" id="sel-1" onchange="changeCam(1)"></select></div>
            <div class="cam-box"><div class="slot"><span class="label" id="lbl-2">R-Boven</span><div id="cont-2" style="height:100%"></div></div><select class="cam-selector" id="sel-2" onchange="changeCam(2)"></select></div>
            <div class="cam-box"><div class="slot"><span class="label" id="lbl-3">L-Onder</span><div id="cont-3" style="height:100%"></div></div><select class="cam-selector" id="sel-3" onchange="changeCam(3)"></select></div>
            <div class="cam-box"><div class="slot"><span class="label" id="lbl-4">R-Onder</span><div id="cont-4" style="height:100%"></div></div><select class="cam-selector" id="sel-4" onchange="changeCam(4)"></select></div>
        </div>
        <div class="info-column">
            <div class="slot fleet-card"><span class="label">Vloot</span><div id="fleet-container" class="list-container"></div></div>
            <div class="slot knmi-card"><span class="label">Noordzee</span><img id="knmi-1" style="width:100%; height:100%; object-fit:contain;"></div>
            <div class="slot knmi-card"><span class="label">Kustwateren</span><img id="knmi-2" style="width:100%; height:100%; object-fit:contain;"></div>
            <div class="slot radar-card"><span class="label">Radar</span><img id="radar-img" style="width:100%; height:100%; object-fit:contain;"></div>
            <div id="last-update" class="timestamp">Laatste fetch: --:--:--</div>
        </div>
    </div>
    <div class="controls"><button class="reset" onclick="hardReset()">HERSTEL STANDAARD</button></div>
</div>

<script>
    const aircraft = [
        { reg: "PH-SAR", icao: "486449" }, { reg: "PH-RSQ", icao: "48644A" },
        { reg: "PH-NCG", icao: "48644B" }, { reg: "C-GCFK", icao: "C04A7D" }, { reg: "C-FCGE", icao: "C005E9" }
    ];

    const bookmarkGroups = [
        { title: "SAR", links: [
            { name: "Amver (surpic)", url: "http://www.amver.com/Forms/SurpicRequest" },
            { name: "LCMS", url: "https://mijn.lcms.nl/gebruikersbeheer/#/login" },
            { name: "ISAR Bristow", url: "https://isar.im/" },
            { name: "CECIS Marine Pollution Log In", url: "https://webgate.ec.europa.eu/CECIS/login.jsp" },
            { name: "P2kflex", url: "https://expert.p2kflex.nl/index.php?regio=403%3B404%3B&audio=&volume=75&include=knrm%3Bkustwacht%3Bredding%3Bwater%3Bgrip" },
            { name: "Winnies.livep2000.nl", url: "https://winnies.livep2000.nl/" },
            { name: "P2000.page", url: "https://p2000.page/" },
            { name: "112MELDINGEN.NL", url: "http://112meldingen.nl/index.php" },
            { name: "CAPCode database", url: "http://www.capcode.nl/capsite/index.php" },
            { name: "Global SAR Hub", url: "https://www.globalsarhub.com/sea-sar.html" },
            { name: "International Cospas-Sarsat", url: "https://cospas-sarsat.int/en/" },
            { name: "LADR", url: "https://ladr.eurocontrol.int/ops/frontend" }
        ]},
        { title: "KNRM/KNBRD", links: [
            { name: "Strandveilig", url: "https://strandveilig.nl/beschikbaar/#/login" },
            { name: "KNRM helpt", url: "https://www.knrmhelpt.nl/index.html?home" },
            { name: "Radio Medische Dienst", url: "https://rmd.businessfundamentals.nl/auth/signin?ReturnUrl=%2fdossiers" },
            { name: "Pre-Com", url: "https://www.pre-com.nl/PreCom/Account/Login" },
            { name: "GIS KNRM", url: "https://www.arcgis.com/apps/mapviewer/index.html?webmap=04162a3c264d462e96e4ec508519ce95" },
            { name: "Portal.lifeguardtracking.nl", url: "https://portal.lifeguardtracking.nl/" }
        ]},
        { title: "RWS/KNMI", links: [
            { name: "RWsOS Viewer", url: "https://rwsos.rws.nl/viewer/map/noordzee/waterkwantiteit" },
            { name: "Waterberichtgeving KWC", url: "https://waterberichtgeving.rws.nl/owb/home" },
            { name: "KNMI extranet", url: "https://exons-prd.auth.eu-west-1.amazoncognito.com/login?client_id=1d98t56sjeb23f09mo3oeu4kab" },
            { name: "Waddendata.nl", url: "https://waddendata.nl/" },
            { name: "Rijkswaterstaat Waterinfo", url: "https://waterinfo.rws.nl/" },
            { name: "GeoWeb (betonning)", url: "https://maps.rijkswaterstaat.nl/geoweb55/index.html?viewer=NMA" },
            { name: "Noordzeeloket", url: "https://www.noordzeeloket.nl/" },
            { name: "Onderwaterobjecten RWS", url: "https://onderwaterobjecten.rws.nl/" },
            { name: "Weerdata Kustwacht", url: "https://weerdatakustwacht.wordpress.com/" }
        ]},
        { title: "Scheepvaart", links: [
            { name: "EMSA Portal", url: "https://portal.emsa.europa.eu/home" },
            { name: "ERICards", url: "http://www.ericards.net/" },
            { name: "Rainwat", url: "http://www.rainwat.bipt.be/" },
            { name: "Lloyds Seasearcher", url: "https://www.seasearcher.com/" },
            { name: "Sign In | NATO ISMERLO", url: "https://ismerlo.org/accounts/login/" },
            { name: "Nautical calculator", url: "https://www.madinstro.net/" },
            { name: "Navtex", url: "http://navtex.lv/" },
            { name: "Kabels Noordzee", url: "https://kis-orca.org/map/" }
        ]},
        { title: "AIS", links: [
            { name: "VIIA", url: "https://viia-p.kustwacht.nl/" },
            { name: "Waterkaart.net", url: "https://waterkaart.net/" },
            { name: "AMS (AIS RWS)", url: "https://ais-ams.rws.rijksweb.nl/ams/" },
            { name: "Maritime Control", url: "https://bfa.kustwacht.nl/" },
            { name: "Madesmart", url: "https://tracker.madesmart.nl/" }
        ]},
        { title: "Scheepvaart DB", links: [
            { name: "Sketchy.boats", url: "https://sketchy.boats/" },
            { name: "406 MHz Registration", url: "https://www.406registration.com" },
            { name: "RescueNET", url: "https://msds.portal.inmarsat.com/msds/" },
            { name: "Beacon Decode", url: "https://cospas-sarsat.int/en/beacons-pro/beacon-message-decode-program-txsep/beacon-message-decode-program" },
            { name: "Ship Station List (ITU)", url: "https://www.itu.int/mmsapp/ShipStation/list" },
            { name: "MMSI MID Codes", url: "https://www.vtexplorer.com/mmsi-mid-codes-en/" },
            { name: "NOGEPA RAS", url: "http://ras.nogepa.nl/login.php" }
        ]},
        { title: "Plannen", links: [
            { name: "IBP Noordzee", url: "https://noordzeeloket.nl/functies-gebruik/artikel-baseline-0/" },
            { name: "IBP SAMIJ", url: "https://ibpsamij.calamiteiten.online/templates/" },
            { name: "Handboek incidentbestrijding", url: "https://nipv.nl/wp-content/uploads/2025/12/20251203-NIPV-Handboek-incidentbestrijding-op-het-water.pdf" }
        ]},
        { title: "Luchtvaart", links: [
            { name: "LVNL AIS", url: "https://www.lvnl.nl/informatie-voor-luchtvarenden/publicaties-voor-luchtvarenden" },
            { name: "SkyVector", url: "https://skyvector.com/" },
            { name: "Aireon Alert", url: "https://aireonalert.iaa.ie/alert-login" },
            { name: "METAR-TAF.com", url: "https://metar-taf.com/" },
            { name: "E6BX Calculator", url: "https://e6bx.com/" },
            { name: "Aviation Glossary", url: "https://www.pilotscafe.com/glossary/" },
            { name: "EHAMCDM Mobile", url: "https://mobile.ehamcdm.nl/" }
        ]},
        { title: "Flight Tracking", links: [
            { name: "FlightAware", url: "https://www.flightaware.com/" },
            { name: "Casper Tracking", url: "https://kustwacht-flighttracking.casper.aero/index.php" },
            { name: "ADS-B Exchange", url: "https://globe.adsbexchange.com/" },
            { name: "Flightradar24", url: "https://www.flightradar24.com/" },
            { name: "Luchtballonradar", url: "https://www.luchtballonradar.nl/" },
            { name: "Bristow Tracking", url: "http://www.bristowgroup.com/globaltracking" }
        ]},
        { title: "Taal/Rekenen", links: [
            { name: "Spelling.nu", url: "https://www.spelling.nu/" },
            { name: "Vertalen.nu", url: "http://www.vertalen.nu/vervoegen/" },
            { name: "NATO Translator", url: "https://cryptii.com/pipes/nato-phonetic-alphabet" },
            { name: "Web 2.0 Calc", url: "https://web2.0calc.com/" }
        ]},
        { title: "Navigatie", links: [
            { name: "GPS Converter", url: "http://www.gpscoordinaten.nl/converteer-gps-coordinaten.php" },
            { name: "Hectometerpaal", url: "http://www.hmpaal.nl/" },
            { name: "Time Zone Map", url: "https://www.timeanddate.com/time/map/" },
            { name: "Apple Maps Beta", url: "https://beta.maps.apple.com/" },
            { name: "Remove Paywalls", url: "https://removepaywalls.com/" }
        ]},
        { title: "Beheer", links: [
            { name: "GitHub Edit", url: "https://github.com/kwcdata/Kustwacht_data/edit/main/index.html" }
        ]}
    ];

    const sourceData = {
        systems: [
            {id: 'https://m.p2kflex.nl/index.php?regio=401%3B403%3B404%3B406%3B&audio=none&include=water%3Blvo%3Bredding%3Bscheepvaart', name: 'P2000 (Kustwacht)', type: 'web'},
            {id: 'https://globe.adsbexchange.com/?lat=52.955&lon=4.760&zoom=8', name: 'ADS-B Exchange', type: 'web'}
        ],
        webcams: [
            {id: 'KjK02QIm4ZI', name: 'Brouwersdam', type: 'yt'},
            {id: 'mI1Os7TFdGc', name: 'Egmond aan Zee', type: 'yt'},
            {id: 'jDF264Bg1_c', name: 'Hoek v Holland Blvd', type: 'yt'},
            {id: 'mnxV4iit7S4', name: 'Kijkduin Blvd', type: 'yt'},
            {id: 'Ud7I4jprFN0', name: 'Maasvlakte', type: 'yt'},
            {id: '_pGIJmXxAHk', name: 'Nieuwe Waterweg', type: 'yt'},
            {id: 'dtFG_mcfWjQ', name: 'Noordwijk Blvd', type: 'yt'},
            {id: 'L76VKII_Z7k', name: 'Noordwijk Vuurtoren', type: 'yt'},
            {id: 'csMnwbjV5vg', name: 'Rockanje', type: 'yt'},
            {id: 'A5kXiKzbBFs', name: 'Scheveningen Blvd', type: 'yt'},
            {id: 'DaG5JReOYEw', name: 'Scheveningen Noord', type: 'yt'},
            {id: 't3qbzZHOTyg', name: 'Wassenaarse Slag', type: 'yt'},
            {id: 'q0-DDh1zdY4', name: 'Zandvoort Blvd', type: 'yt'}
        ]
    };

    const defaults = { 1: sourceData.systems[0].id, 2: sourceData.systems[1].id, 3: 'A5kXiKzbBFs', 4: 'q0-DDh1zdY4' };

    function updateClocks() {
        const nu = new Date();
        document.getElementById('local-clock').innerText = nu.toLocaleTimeString('nl-NL', { hour12: false });
        document.getElementById('zulu-clock').innerText = nu.getUTCHours().toString().padStart(2,'0') + ":" + nu.getUTCMinutes().toString().padStart(2,'0') + ":" + nu.getUTCSeconds().toString().padStart(2,'0');
    }

    async function checkKNMIAlert() {
        try {
            const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://webservice.knmi.nl/cgi-bin/rss_knmi.cgi?tekst=1'));
            const data = await response.json();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(data.contents, "text/xml");
            const description = xmlDoc.getElementsByTagName("description")[1]?.childNodes[0]?.nodeValue || "";
            const bar = document.getElementById('weather-status-bar');
            const txt = document.getElementById('status-text');
            bar.className = ''; 
            if (description.includes("ROOD")) { bar.classList.add('code-rood'); txt.innerText = "STATUS: CODE ROOD"; }
            else if (description.includes("ORANJE")) { bar.classList.add('code-oranje'); txt.innerText = "STATUS: CODE ORANJE"; }
            else if (description.includes("GEEL")) { bar.classList.add('code-geel'); txt.innerText = "STATUS: CODE GEEL"; }
            else { bar.classList.add('code-groen'); txt.innerText = "STATUS: CODE GROEN"; }
        } catch (e) { console.log("KNMI check failed."); }
    }

    function initNavBar() {
        const nav = document.getElementById('nav-bar');
        nav.innerHTML = bookmarkGroups.map(g => `
            <div class="nav-group">${g.title} ▾
                <div class="dropdown">${g.links.map(l => `<a href="${l.url}" target="_blank">${l.name}</a>`).join('')}</div>
            </div>
        `).join('');
    }

    function setupSelectors() {
        for (let i = 1; i <= 4; i++) {
            const sel = document.getElementById('sel-' + i);
            sel.innerHTML = ''; 
            const defaultId = defaults[i];
            const g1 = document.createElement('optgroup'); g1.label = "Systemen";
            sourceData.systems.forEach(s => { g1.appendChild(new Option((s.id === defaultId ? "★ " : "") + s.name, s.id)); });
            const g2 = document.createElement('optgroup'); g2.label = "Webcams";
            sourceData.webcams.forEach(w => { g2.appendChild(new Option((w.id === defaultId ? "★ " : "") + w.name, w.id)); });
            sel.add(g1); sel.add(g2);
            sel.value = defaultId;
        }
    }

    function setCamera(pos, id, name, type) {
        const container = document.getElementById('cont-' + pos);
        const url = type === 'web' ? id : `https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;
        container.innerHTML = `<iframe src="${url}" allow="autoplay; allowfullscreen"></iframe>`;
        document.getElementById('lbl-' + pos).innerText = name.replace("★ ", "");
    }

    function changeCam(pos) {
        const sel = document.getElementById('sel-' + pos);
        const id = sel.value;
        const name = sel.options[sel.selectedIndex].text;
        const type = sourceData.systems.find(s => s.id === id) ? 'web' : 'yt';
        setCamera(pos, id, name, type);
    }

    function initFleet() {
        document.getElementById('fleet-container').innerHTML = aircraft.map(p => `
            <div class="fleet-item"><strong style="color:#00d4ff">${p.reg}</strong>
            <button class="btn-track" onclick="trackPlane('${p.icao}', '${p.reg}')">TRACK</button></div>
        `).join('');
    }

    function trackPlane(icao, reg) {
        const url = `https://globe.adsbexchange.com/?icao=${icao}&zoom=11`;
        setCamera(2, url, `Tracking: ${reg}`, 'web');
        document.getElementById('sel-2').value = ""; 
    }

    function verversData() {
        const t = new Date().getTime();
        document.getElementById('knmi-1').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/northseamap.png?t=" + t;
        document.getElementById('knmi-2').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/kust-en-noordzee/waarschuwing_kust_0.gif?t=" + t;
        document.getElementById('radar-img').src = "https://api.buienradar.nl/image/1.0/RadarMapNL?w=350&h=350&t=" + t;
        document.getElementById('popover-map').src = "https://cdn.knmi.nl/knmi/map/page/weer/waarschuwingen_verwachtingen/waarschuwing_land_0.gif?t=" + t;
        document.getElementById('last-update').innerText = "Fetch: " + new Date().toLocaleTimeString();
        checkKNMIAlert();
    }

    function hardReset() {
        for(let p in defaults) {
            const id = defaults[p];
            const item = [...sourceData.systems, ...sourceData.webcams].find(x => x.id === id);
            setCamera(p, id, (item.id === id ? "★ " : "") + item.name, sourceData.systems.includes(item) ? 'web' : 'yt');
        }
        verversData();
    }

    document.addEventListener('DOMContentLoaded', () => { 
        setupSelectors(); initFleet(); initNavBar(); hardReset(); updateClocks();
        setInterval(updateClocks, 1000); setInterval(verversData, 300000); 
    });
</script>
</body>
</html>
